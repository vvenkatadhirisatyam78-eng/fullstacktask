<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists Example</title>
</head>
<body>

    <h2>Ordered List</h2>
    <ol type="1">
        <li>Apple</li>
        <li>Orange</li>
        <li>Grapefruit</li>
    </ol>

    <h2>Unordered List</h2>
    <ul type="disc">
        <li>Apple</li>
        <li>Orange</li>
        <li>Grapefruit</li>
    </ul>

    <h2>Description List</h2>
    <dl>
        <dt>HTML</dt>
        <dd>A markup language</dd>
        <dt>CSS</dt>
        <dd>Style</dd>
        <dt>JS</dt>
        <dd>plag</dd>

    </dl>

</body>
</html>
