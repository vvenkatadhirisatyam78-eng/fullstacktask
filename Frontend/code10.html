<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            background-color: aqua;
        }
    </style>
    <title>Inline Style Example</title>
</head>
<body>

<h1 style="color: green";>Welcome to HTML</h1>

<p style="color: blue;">
    This paragraph text is blue.
</p>

<p style="color: rgb(0, 255, 76);">
    This paragraph text is red.
</p>

<p style="font-size: 20px;">
    This paragraph has bigger text.
</p>

<p style="color: purple; font-size: 18px;">
    This paragraph has color and size.
</p>

</body>
</html>
