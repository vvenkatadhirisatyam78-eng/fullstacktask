<!DOCTYPE html>
<html>
<head>
    <title>Daily Activity Report</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 32px;
        }

        table {
            width: 80%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #eaeaea;
        }

        .container {
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>

</head>
<body>

<div class="container">
    <h1>Daily Activity Report</h1>

    <h2>Summary</h2>
    <table>
        <tr>
            <th>Date</th>
            <th>Total Changes</th>
        </tr>

        {% for r in report %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <h2>Detailed Logs</h2>
    <table>
        <tr>
            <th>Log ID</th>
            <th>Order ID</th>
            <th>Action</th>
            <th>Old Status</th>
            <th>New Status</th>
            <th>Changed At</th>
        </tr>

        {% for log in logs %}
        <tr>
            <td>{{ log[0] }}</td>
            <td>{{ log[1] }}</td>
            <td>{{ log[2] }}</td>
            <td>{{ log[3] }}</td>
            <td>{{ log[4] }}</td>
            <td>{{ log[5] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Back</a>
</div>

</body>
</html>
